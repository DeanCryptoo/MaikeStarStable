<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StarStable Checklist</title>
    <meta
      name="description"
      content="Track your Star Stable items with favorites and ownership checkmarks."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Public+Sans:wght@400;600;700;800&family=Righteous&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient-wrap" aria-hidden="true">
      <video
        id="ambientVideo"
        class="ambient-video"
        autoplay
        muted
        loop
        playsinline
        preload="none"
        poster="https://ssodb.bplaced.net/db/media/images/bg_header.webp"
        data-note="Optional: add a local ambient loop source (e.g., assets/ambient/sso-ambient-loop.mp4)"
      >
      </video>
    </div>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="app-shell">
      <button id="mobileMenuBtn" class="mobile-menu-btn" type="button" aria-controls="sideMenu" aria-expanded="false">
        &#9776; Menu
      </button>

      <aside id="sideMenu" class="sidebar">
        <button id="mobileMenuClose" class="mobile-menu-close" type="button" aria-label="Close menu">&#10005;</button>
        <div class="sidebar-head">
          <p class="sidebar-kicker">Menu</p>
          <h1>StarStable Checklist</h1>
        </div>
        <nav id="categorySidebar" class="category-sidebar"></nav>
      </aside>
      <button id="menuBackdrop" class="menu-backdrop" type="button" aria-label="Close menu"></button>

      <section class="content">
        <section class="controls">
          <div class="search-wrap">
            <label for="searchInput">Text Search</label>
            <input
              id="searchInput"
              type="search"
              placeholder="Type item name, description, location..."
              autocomplete="off"
            />
          </div>

          <div class="filter-grid">
            <label class="field">
              <span>Language</span>
              <select id="languageSelect"></select>
            </label>
            <label class="field">
              <span>Location</span>
              <select id="locationFilter"></select>
            </label>
            <label class="field">
              <span>Shop</span>
              <select id="shopFilter"></select>
            </label>
            <label class="field">
              <span>Type</span>
              <select id="typeFilter"></select>
            </label>
            <div class="field field-btn">
              <span>&nbsp;</span>
              <button id="clearFiltersBtn" type="button">Clear filters</button>
            </div>
          </div>
          <div id="activeFilters" class="active-filters" aria-live="polite"></div>

          <div class="toggle-row">
            <label class="pill-toggle">
              <input id="ownedOnlyToggle" type="checkbox" />
              <span>Owned only</span>
            </label>
            <label class="pill-toggle">
              <input id="favoritesOnlyToggle" type="checkbox" />
              <span>Favorites only</span>
            </label>
            <label class="pill-toggle">
              <input id="newOnlyToggle" type="checkbox" />
              <span>New items only</span>
            </label>
          </div>

          <div class="actions-row">
            <button id="exportStateBtn" type="button">Export checklist state</button>
            <button id="importStateBtn" type="button">Import checklist state</button>
            <button id="clearStateBtn" type="button" class="danger">Clear checks</button>
            <input id="importFileInput" type="file" accept="application/json" hidden />
          </div>
        </section>

        <section class="stats">
          <div class="stat-main">
            <div class="stat-line">
              <strong id="ownedCount">0</strong>
              <span id="totalCount">/ 0 owned</span>
            </div>
            <div class="progress-track">
              <div id="progressFill" class="progress-fill"></div>
            </div>
          </div>
          <div class="stat-side">
            <div>
              <span class="label">Favorites</span>
              <strong id="favoritesCount">0</strong>
            </div>
            <div>
              <span class="label">Filtered results</span>
              <strong id="filteredCount">0</strong>
            </div>
          </div>
        </section>

        <section class="results">
          <div id="itemsGrid" class="items-grid"></div>
          <div id="emptyState" class="empty-state" hidden>
            <img src="assets/ui/empty-horse.svg" alt="" aria-hidden="true" />
            <h3>No matching items</h3>
            <p>Try changing category or filters.</p>
          </div>
          <button id="loadMoreBtn" type="button" class="load-more" hidden>
            Load more
          </button>
        </section>
      </section>
    </main>

    <template id="itemCardTemplate">
      <article class="item-card">
        <button type="button" class="fav-btn" title="Toggle favorite">&#9734;</button>
        <img class="item-image" alt="" loading="lazy" decoding="async" />
        <div class="item-content">
          <h2 class="item-title"></h2>
          <p class="item-desc"></p>
          <div class="item-quick"></div>
          <button type="button" class="details-toggle">Details</button>
          <div class="item-meta" hidden></div>
          <label class="owned-check">
            <input type="checkbox" />
            <span>Owned</span>
          </label>
        </div>
      </article>
    </template>

    <script src="data/items.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
