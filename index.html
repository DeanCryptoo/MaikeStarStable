<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StarStable Checklist</title>
    <meta
      name="description"
      content="Track your Star Stable items with favorites and ownership checkmarks."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&family=Righteous&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="hero-kicker">Community-driven collection tracker</p>
        <h1>StarStable Checklist</h1>
        <p class="hero-subtitle">
          Favorite the things you want and check off everything you already own.
        </p>
      </header>

      <section class="controls">
        <div class="search-wrap">
          <label for="searchInput">Search</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Type item name, type, or location..."
            autocomplete="off"
          />
        </div>

        <div class="toggle-row">
          <label class="pill-toggle">
            <input id="ownedOnlyToggle" type="checkbox" />
            <span>Owned only</span>
          </label>
          <label class="pill-toggle">
            <input id="favoritesOnlyToggle" type="checkbox" />
            <span>Favorites only</span>
          </label>
          <label class="pill-toggle">
            <input id="newOnlyToggle" type="checkbox" />
            <span>New items only</span>
          </label>
        </div>

        <div class="category-area">
          <div class="category-head">
            <span>Categories</span>
            <button id="toggleAllCategoriesBtn" type="button">Toggle all</button>
          </div>
          <div id="categoryChips" class="category-chips"></div>
        </div>

        <div class="actions-row">
          <button id="exportStateBtn" type="button">Export checklist state</button>
          <button id="importStateBtn" type="button">Import checklist state</button>
          <button id="clearStateBtn" type="button" class="danger">Clear checks</button>
          <input id="importFileInput" type="file" accept="application/json" hidden />
        </div>
      </section>

      <section class="stats">
        <div class="stat-main">
          <div class="stat-line">
            <strong id="ownedCount">0</strong>
            <span id="totalCount">/ 0 owned</span>
          </div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
        <div class="stat-side">
          <div>
            <span class="label">Favorites</span>
            <strong id="favoritesCount">0</strong>
          </div>
          <div>
            <span class="label">Filtered results</span>
            <strong id="filteredCount">0</strong>
          </div>
        </div>
      </section>

      <section class="results">
        <div id="itemsGrid" class="items-grid"></div>
        <div id="emptyState" class="empty-state" hidden>No matching items.</div>
        <button id="loadMoreBtn" type="button" class="load-more" hidden>
          Load more
        </button>
      </section>
    </main>

    <template id="itemCardTemplate">
      <article class="item-card">
        <button type="button" class="fav-btn" title="Toggle favorite">☆</button>
        <img class="item-image" alt="" loading="lazy" decoding="async" />
        <div class="item-content">
          <h2 class="item-title"></h2>
          <p class="item-desc"></p>
          <div class="item-meta"></div>
          <label class="owned-check">
            <input type="checkbox" />
            <span>Owned</span>
          </label>
        </div>
      </article>
    </template>

    <script src="data/items.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
